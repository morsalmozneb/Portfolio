<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Coming soon project card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141130"/>
      <stop offset="50%" stop-color="#0d0b22"/>
      <stop offset="100%" stop-color="#080714"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8C91F7" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#8C91F7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8C91F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="380" rx="620" ry="300" fill="url(#spot)"/>

  <!-- Decorative concentric rings -->
  <g fill="none" stroke="#8C91F7" stroke-opacity="0.12">
    <circle cx="800" cy="380" r="220" stroke-width="1"/>
    <circle cx="800" cy="380" r="290" stroke-width="1" stroke-dasharray="6 10" stroke-opacity="0.08"/>
    <circle cx="800" cy="380" r="360" stroke-width="1" stroke-opacity="0.05"/>
  </g>

  <!-- Status pill -->
  <g>
    <rect x="700" y="230" width="200" height="34" rx="17" ry="17" fill="rgba(140,145,247,0.1)" stroke="#8C91F7" stroke-opacity="0.4"/>
    <circle cx="720" cy="247" r="5" fill="#8C91F7"/>
    <text x="734" y="252" fill="#8C91F7" font-family="'Courier New', monospace" font-size="13" font-weight="700" letter-spacing="3">IN DEVELOPMENT</text>
  </g>

  <!-- Headline -->
  <text x="800" y="380" text-anchor="middle" fill="#E4E4E4" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="90" font-weight="800" letter-spacing="-2">
    Coming
  </text>
  <text x="800" y="470" text-anchor="middle" fill="#8C91F7" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="90" font-weight="800" letter-spacing="-2" style="filter: drop-shadow(0 0 24px rgba(140,145,247,0.45));">
    Soon
  </text>

  <text x="800" y="530" text-anchor="middle" fill="rgba(228,228,228,0.55)" font-family="'Inter', sans-serif" font-size="22" letter-spacing="1">
    My next case study — arriving shortly.
  </text>
</svg>
