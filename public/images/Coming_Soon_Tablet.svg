<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Coming soon tablet mockup">
  <defs>
    <linearGradient id="bezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="55%" stop-color="#0f0d1e"/>
      <stop offset="100%" stop-color="#080714"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151232"/>
      <stop offset="50%" stop-color="#0d0b22"/>
      <stop offset="100%" stop-color="#0a0918"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8C91F7" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#8C91F7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8C91F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Tablet bezel -->
  <rect x="60" y="40" width="680" height="520" rx="36" ry="36" fill="url(#bezel)" stroke="#2a2648" stroke-width="2"/>
  <!-- Camera dot -->
  <circle cx="400" cy="62" r="4" fill="#3a3560"/>

  <!-- Screen -->
  <rect x="80" y="82" width="640" height="440" rx="16" ry="16" fill="url(#screen)"/>

  <!-- Ambient glow behind text -->
  <ellipse cx="400" cy="300" rx="260" ry="140" fill="url(#glow)"/>

  <!-- Decorative orbit rings -->
  <circle cx="400" cy="300" r="150" fill="none" stroke="#8C91F7" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="400" cy="300" r="190" fill="none" stroke="#8C91F7" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- Status pill -->
  <g>
    <rect x="330" y="180" width="140" height="26" rx="13" ry="13" fill="rgba(140,145,247,0.1)" stroke="#8C91F7" stroke-opacity="0.35"/>
    <circle cx="346" cy="193" r="4" fill="#8C91F7"/>
    <text x="357" y="197" fill="#8C91F7" font-family="'Courier New', monospace" font-size="10" font-weight="700" letter-spacing="2.5">IN DEVELOPMENT</text>
  </g>

  <!-- Main title -->
  <text x="400" y="290" text-anchor="middle" fill="#E4E4E4" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" font-weight="800" letter-spacing="-1">
    Coming
  </text>
  <text x="400" y="350" text-anchor="middle" fill="#8C91F7" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" font-weight="800" letter-spacing="-1" style="filter: drop-shadow(0 0 18px rgba(140,145,247,0.4));">
    Soon
  </text>

  <!-- Subtitle -->
  <text x="400" y="390" text-anchor="middle" fill="rgba(228,228,228,0.55)" font-family="'Inter', sans-serif" font-size="14" letter-spacing="0.5">
    Next case study in progress.
  </text>

  <!-- Loading bar -->
  <rect x="300" y="430" width="200" height="4" rx="2" fill="rgba(140,145,247,0.12)"/>
  <rect x="300" y="430" width="120" height="4" rx="2" fill="#8C91F7" opacity="0.85"/>

  <!-- Progress label -->
  <text x="400" y="455" text-anchor="middle" fill="rgba(140,145,247,0.6)" font-family="'Courier New', monospace" font-size="9" letter-spacing="3">
    LOADING / 60%
  </text>

  <!-- Bottom corner grid dots -->
  <g fill="rgba(140,145,247,0.35)">
    <circle cx="110" cy="492" r="1.5"/>
    <circle cx="120" cy="492" r="1.5"/>
    <circle cx="130" cy="492" r="1.5"/>
    <circle cx="110" cy="502" r="1.5"/>
    <circle cx="120" cy="502" r="1.5"/>
  </g>
  <g fill="rgba(140,145,247,0.35)">
    <circle cx="670" cy="492" r="1.5"/>
    <circle cx="680" cy="492" r="1.5"/>
    <circle cx="690" cy="492" r="1.5"/>
    <circle cx="680" cy="502" r="1.5"/>
    <circle cx="690" cy="502" r="1.5"/>
  </g>
</svg>
