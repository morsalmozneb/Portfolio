<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Morsal Mozneb</title>
    <meta
      name="description"
      content="The page you requested could not be found on Morsal Mozneb's portfolio."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        color: #e4e4e4;
        background:
          radial-gradient(circle at top, rgba(140, 145, 247, 0.18), transparent 35%),
          linear-gradient(180deg, #0a0918 0%, #0f0d1e 35%, #110f24 65%, #0a0918 100%);
      }

      main {
        width: min(100%, 760px);
        padding: 40px;
        border-radius: 32px;
        border: 1px solid rgba(140, 145, 247, 0.2);
        background: linear-gradient(145deg, rgba(140, 145, 247, 0.08), rgba(13, 12, 30, 0.58));
        box-shadow: 0 24px 54px rgba(0, 0, 0, 0.28);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: rgba(228, 228, 228, 0.75);
      }

      .eyebrow {
        color: #8c91f7;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.4rem, 6vw, 4.6rem);
        line-height: 1;
      }

      a {
        display: inline-block;
        margin-top: 12px;
        padding: 14px 22px;
        border-radius: 999px;
        color: #080814;
        font-weight: 700;
        text-decoration: none;
        background: linear-gradient(135deg, #7b80e7 0%, #9ca0ff 100%);
        box-shadow: 0 12px 30px rgba(140, 145, 247, 0.22);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Error 404</p>
      <h1>This page does not exist.</h1>
      <p>
        The link may be broken, the page may have moved, or the address may be incorrect.
        Return to the portfolio homepage to keep browsing.
      </p>
      <a href="https://morsalmozneb.com/">Back to home</a>
    </main>
  </body>
</html>
